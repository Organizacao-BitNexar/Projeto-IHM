{%load static %}
<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Solar Interativo</title>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

  <link rel="stylesheet" href="Galaxia_Para_Todos\Projeto-IHM\sistema_solar\static\css\style.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <style>@view-transition { navigation: auto; }</style>
  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>

  <main class="container">
   <header class="header">
    <h1 class="main-title" id="mainTitle">Sistema Solar Interativo</h1>
    <p class="subtitle" id="subtitle">Clique nos planetas para explorar suas características</p>
    <div class="search-container">
     <div class="search-box"><input type="text" id="searchInput" placeholder="Buscar planetas, luas ou o Sol..." class="search-input"> <button onclick="clearSearch()" class="clear-btn" id="clearBtn" style="display: none;">✕</button>
     </div>
     <div class="search-results" id="searchResults"></div>
    </div>
    <div class="controls-section"><button onclick="openAddModal()" class="add-btn"> ➕ Adicionar Informação </button>
     <div class="filter-section"><label for="categoryFilter" class="filter-label">Filtrar por categoria:</label> <select id="categoryFilter" onchange="filterByCategory()" class="filter-select"> <option value="all">Todos</option> <option value="star">Estrelas</option> <option value="planet">Planetas</option> <option value="moon">Luas</option> </select>
     </div>
    </div>
   </header>

     <div class="planet-name">

    </div>

      Mercúrio
     </div>
    </div>

        <stop offset="0%" style="stop-color:#ffc649" />
        <stop offset="100%" style="stop-color:#ff8f00" />

   </section><!-- Modal para adicionar informações -->
   <div class="modal-overlay" id="addModal" style="display: none;">
    <div class="modal-content">
     <div class="modal-header">
      <h2>Adicionar Nova Informação</h2><button onclick="closeAddModal()" class="modal-close">✕</button>
     </div>
     <form id="addForm" class="add-form">
      <div class="form-row">
       <div class="form-group"><label for="bodyName">Nome do Corpo Celeste *</label> <input type="text" id="bodyName" required>
       </div>
       <div class="form-group"><label for="bodyCategory">Categoria *</label> <select id="bodyCategory" onchange="toggleParentPlanet()" required> <option value="">Selecione...</option> <option value="star">Estrela</option> <option value="planet">Planeta</option> <option value="moon">Lua</option> </select>
       </div>
      </div>
      <div class="form-group" id="parentPlanetGroup" style="display: none;"><label for="parentPlanet">Planeta Principal *</label> <select id="parentPlanet"> <option value="">Selecione o planeta...</option> </select>
      </div>
      <div class="form-row">
       <div class="form-group"><label for="bodyType">Tipo</label> <input type="text" id="bodyType" placeholder="Ex: Planeta Rochoso, Gigante Gasoso">
       </div>
       <div class="form-group"><label for="bodyDistance">Distância</label> <input type="text" id="bodyDistance" placeholder="Ex: 149.600.000 km do Sol">
       </div>
      </div>
      <div class="form-row">
       <div class="form-group"><label for="bodyDiameter">Diâmetro</label> <input type="text" id="bodyDiameter" placeholder="Ex: 12.756 km">
       </div>
       <div class="form-group"><label for="bodyMass">Massa</label> <input type="text" id="bodyMass" placeholder="Ex: 5.972 × 10²⁴ kg">
       </div>
      </div>
      <div class="form-row">
       <div class="form-group"><label for="bodyTemperature">Temperatura</label> <input type="text" id="bodyTemperature" placeholder="Ex: -89°C a 58°C">
       </div>
       <div class="form-group"><label for="bodyMoons">Número de Luas</label> <input type="text" id="bodyMoons" placeholder="Ex: 1, 95 conhecidas">
       </div>
      </div>
      <div class="form-group"><label for="bodyComposition">Composição</label> <input type="text" id="bodyComposition" placeholder="Ex: 73% hidrogênio, 25% hélio">
      </div>
      <div class="form-group"><label for="bodyImageUrl">URL da Imagem</label> <input type="url" id="bodyImageUrl" placeholder="https://exemplo.com/imagem.jpg"> <small>Cole o link de uma imagem do corpo celeste</small>
      </div>
      <div class="form-group"><label for="bodyCuriosities">Curiosidades *</label> <textarea id="bodyCuriosities" rows="4" placeholder="Descreva fatos interessantes sobre este corpo celeste..." required></textarea>
      </div>
      <div class="form-actions"><button type="button" onclick="closeAddModal()" class="btn-cancel">Cancelar</button> <button type="submit" class="btn-save" id="saveBtn"> <span class="btn-text">Salvar Informação</span> <span class="btn-loading" style="display: none;">Salvando...</span> </button>
      </div>
     </form>
    </div>
   </div>
  </main>

        function showInfo(planet) {
            const data = planetData[planet];
            const infoPanel = document.getElementById('infoPanel');
            const infoContent = document.getElementById('infoContent');
            
            let html = '';
            for (const [key, value] of Object.entries(data)) {
                if (key !== 'nome' && key !== 'luasDetalhes') {
                    const label = key.charAt(0).toUpperCase() + key.slice(1);
                    html += `
                        <div class="info-item">
                            <div class="info-label">${label}:</div>
                            <div class="info-value">${value}</div>
                        </div>
                    `;
                }
            }
            
            // Adicionar informações das luas se existirem
            if (data.luasDetalhes) {
                html += `
                    <div class="info-item" style="grid-column: 1 / -1;">
                        <div class="info-label">Detalhes das Luas:</div>
                        <div class="moons-container">
                `;
                
                for (const [moonName, moonData] of Object.entries(data.luasDetalhes)) {
                    html += `
                        <div class="moon-card">
                            <h4 class="moon-name">${moonName}</h4>
                            <div class="moon-details">
                                <div class="moon-detail">
                                    <span class="moon-detail-label">Diâmetro:</span>
                                    <span class="moon-detail-value">${moonData.diametro}</span>
                                </div>
                                <div class="moon-detail">
                                    <span class="moon-detail-label">Distância:</span>
                                    <span class="moon-detail-value">${moonData.distancia}</span>
                                </div>
                                <div class="moon-detail">
                                    <span class="moon-detail-label">Período orbital:</span>
                                    <span class="moon-detail-value">${moonData.periodo}</span>
                                </div>
                                <div class="moon-detail">
                                    <span class="moon-detail-label">Temperatura:</span>
                                    <span class="moon-detail-value">${moonData.temperatura}</span>
                                </div>
                                <div class="moon-detail">
                                    <span class="moon-detail-label">Curiosidades:</span>
                                    <span class="moon-detail-value">${moonData.curiosidades}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                html += `
                        </div>
                    </div>
                `;
            }
            
            infoContent.innerHTML = html;
            infoPanel.style.display = 'block';
            infoPanel.scrollIntoView({ behavior: 'smooth' });
        }

        function closeInfo() {
            document.getElementById('infoPanel').style.display = 'none';
        }

        // Data SDK Handler
        const dataHandler = {
            onDataChanged(data) {
                userCelestialBodies = data;
                updateSearchIndex();
                renderUserCelestialBodies();
                updateParentPlanetOptions();
            }
        };

        // Inicializar Data SDK
        let sdkInitialized = false;
        
        async function initializeDataSDK() {
            if (window.dataSdk && !sdkInitialized) {
                try {
                    const result = await window.dataSdk.init(dataHandler);
                    if (result.isOk) {
                        sdkInitialized = true;
                        console.log("Data SDK inicializado com sucesso");
                    } else {
                        console.error("Erro ao inicializar Data SDK:", result.error);
                    }
                } catch (error) {
                    console.error("Erro inesperado ao inicializar SDK:", error);
                }
            }
        }
        
        // Função para aguardar inicialização do SDK
        async function waitForSDKInitialization() {
            let attempts = 0;
            const maxAttempts = 50; // 5 segundos máximo
            
            while (!sdkInitialized && attempts < maxAttempts) {
                if (window.dataSdk) {
                    await initializeDataSDK();
                }
                if (!sdkInitialized) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }
            }
            
            return sdkInitialized;
        }

        // Sistema de busca
        function createSearchIndex() {
            const searchIndex = [];
            
            // Adicionar planetas e Sol padrão
            for (const [key, data] of Object.entries(planetData)) {
                searchIndex.push({
                    id: key,
                    name: data.nome,
                    type: data.tipo,
                    category: key === 'sol' ? 'star' : 'planet',
                    searchTerms: [data.nome.toLowerCase(), key.toLowerCase()],
                    isDefault: true
                });
                
                // Adicionar luas padrão se existirem
                if (data.luasDetalhes) {
                    for (const [moonName, moonData] of Object.entries(data.luasDetalhes)) {
                        searchIndex.push({
                            id: key,
                            name: moonName,
                            type: `Lua de ${data.nome}`,
                            category: 'moon',
                            parent: data.nome,
                            searchTerms: [moonName.toLowerCase(), `lua de ${data.nome.toLowerCase()}`],
                            isDefault: true
                        });
                    }
                }
            }
            
            // Adicionar corpos celestes do usuário
            userCelestialBodies.forEach(body => {
                if (body.category === 'moon') {
                    searchIndex.push({
                        id: body.id,
                        name: body.name,
                        type: `Lua de ${body.parent_planet}`,
                        category: 'moon',
                        parent: body.parent_planet,
                        searchTerms: [body.name.toLowerCase(), `lua de ${body.parent_planet.toLowerCase()}`],
                        isDefault: false
                    });
                } else {
                    searchIndex.push({
                        id: body.id,
                        name: body.name,
                        type: body.type || body.category,
                        category: body.category,
                        searchTerms: [body.name.toLowerCase()],
                        isDefault: false
                    });
                }
            });
            
            return searchIndex;
        }

        let searchIndex = createSearchIndex();

        function updateSearchIndex() {
            searchIndex = createSearchIndex();
        }

        function performSearch(query) {
            if (!query || query.length < 2) return [];
            
            const normalizedQuery = query.toLowerCase().trim();
            const results = [];
            
            searchIndex.forEach(item => {
                const score = item.searchTerms.reduce((maxScore, term) => {
                    if (term === normalizedQuery) return Math.max(maxScore, 100);
                    if (term.startsWith(normalizedQuery)) return Math.max(maxScore, 80);
                    if (term.includes(normalizedQuery)) return Math.max(maxScore, 60);
                    return maxScore;
                }, 0);
                
                if (score > 0) {
                    results.push({ ...item, score });
                }
            });
            
            return results.sort((a, b) => b.score - a.score).slice(0, 8);
        }

        function displaySearchResults(results) {
            const searchResults = document.getElementById('searchResults');
            
            if (results.length === 0) {
                searchResults.innerHTML = '<div class="no-results">Nenhum resultado encontrado</div>';
                searchResults.style.display = 'block';
                return;
            }
            
            const html = results.map(result => {
                const iconColor = result.category === 'planet' ? getIconColor(result.id) : '#888';
                return `
                    <div class="search-result-item" onclick="selectSearchResult('${result.id}', '${result.category}')">
                        <div class="search-result-icon" style="background: ${iconColor};"></div>
                        <div class="search-result-content">
                            <div class="search-result-name">${result.name}</div>
                            <div class="search-result-type">${result.type}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            searchResults.innerHTML = html;
            searchResults.style.display = 'block';
        }

        function getIconColor(planetId) {
            const colors = {
                sol: '#ffeb3b',
                mercurio: '#d4af37',
                venus: '#ffc649',
                terra: '#4fc3f7',
                marte: '#ff7043',
                jupiter: '#ffb74d',
                saturno: '#ffcc02',
                urano: '#4fc3f7',
                netuno: '#3f51b5'
            };
            return colors[planetId] || '#888';
        }

        function selectSearchResult(planetId, category) {
            if (searchIndex.find(item => item.id === planetId && !item.isDefault)) {
                showUserCelestialBodyInfo(planetId);
            } else {
                showInfo(planetId);
            }
            clearSearch();
        }

        // Funções do modal
        function openAddModal() {
            document.getElementById('addModal').style.display = 'flex';
            document.querySelector('.modal-header h2').textContent = 'Adicionar Nova Informação';
            document.getElementById('addForm').removeAttribute('data-edit-id');
            updateParentPlanetOptions();
        }

        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('addForm').reset();
            document.getElementById('parentPlanetGroup').style.display = 'none';
            document.getElementById('addForm').removeAttribute('data-edit-id');
            document.querySelector('.modal-header h2').textContent = 'Adicionar Nova Informação';
        }

        // Função para editar corpo celeste
        function editCelestialBody(bodyId) {
            const body = userCelestialBodies.find(b => b.id === bodyId);
            if (!body) return;
            
            // Preencher o formulário com os dados existentes
            document.getElementById('bodyName').value = body.name || '';
            document.getElementById('bodyCategory').value = body.category || '';
            document.getElementById('bodyType').value = body.type || '';
            document.getElementById('bodyDistance').value = body.distance || '';
            document.getElementById('bodyDiameter').value = body.diameter || '';
            document.getElementById('bodyMass').value = body.mass || '';
            document.getElementById('bodyTemperature').value = body.temperature || '';
            document.getElementById('bodyMoons').value = body.moons || '';
            document.getElementById('bodyComposition').value = body.composition || '';
            document.getElementById('bodyCuriosities').value = body.curiosities || '';
            document.getElementById('bodyImageUrl').value = body.image_url || '';
            document.getElementById('parentPlanet').value = body.parent_planet || '';
            
            // Configurar o modal para modo de edição
            document.querySelector('.modal-header h2').textContent = 'Editar Informações';
            document.getElementById('addForm').setAttribute('data-edit-id', bodyId);
            
            // Mostrar/esconder campo de planeta pai
            toggleParentPlanet();
            
            // Abrir modal
            document.getElementById('addModal').style.display = 'flex';
            updateParentPlanetOptions();
        }

        // Função para confirmar exclusão
        function confirmDeleteCelestialBody(bodyId) {
            const body = userCelestialBodies.find(b => b.id === bodyId);
            if (!body) return;
            
            const infoContent = document.getElementById('infoContent');
            
            // Criar interface de confirmação
            const confirmationHtml = `
                <div class="info-item delete-confirmation" style="grid-column: 1 / -1;">
                    <h4>⚠️ Confirmar Exclusão</h4>
                    <p>Tem certeza que deseja excluir <strong>"${body.name}"</strong>?<br>
                    Esta ação não pode ser desfeita.</p>
                    <div class="delete-actions">
                        <button onclick="cancelDelete()" class="action-btn btn-cancel">
                            ❌ Cancelar
                        </button>
                        <button onclick="deleteCelestialBody('${bodyId}')" class="action-btn confirm-delete-btn">
                            🗑️ Confirmar Exclusão
                        </button>
                    </div>
                </div>
            `;
            
            // Inserir no topo do conteúdo
            infoContent.insertAdjacentHTML('afterbegin', confirmationHtml);
        }

        // Função para cancelar exclusão
        function cancelDelete() {
            const confirmation = document.querySelector('.delete-confirmation');
            if (confirmation) {
                confirmation.remove();
            }
        }

        // Função para excluir corpo celeste
        async function deleteCelestialBody(bodyId) {
            // Aguardar inicialização do SDK
            const isInitialized = await waitForSDKInitialization();
            if (!isInitialized) {
                showMessage("Erro: Sistema de dados não está disponível", "error");
                return;
            }
            
            const body = userCelestialBodies.find(b => b.id === bodyId);
            if (!body) return;
            
            const confirmBtn = document.querySelector('.confirm-delete-btn');
            const originalText = confirmBtn.innerHTML;
            
            // Mostrar loading
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '⏳ Excluindo...';
            
            try {
                const result = await window.dataSdk.delete(body);
                
                if (result.isOk) {
                    showMessage(`"${body.name}" foi excluído com sucesso!`, "success");
                    closeInfo(); // Fechar painel de informações
                } else {
                    showMessage("Erro ao excluir: " + result.error.message, "error");
                    confirmBtn.disabled = false;
                    confirmBtn.innerHTML = originalText;
                }
            } catch (error) {
                showMessage("Erro inesperado ao excluir", "error");
                confirmBtn.disabled = false;
                confirmBtn.innerHTML = originalText;
            }
        }

        function toggleParentPlanet() {
            const category = document.getElementById('bodyCategory').value;
            const parentGroup = document.getElementById('parentPlanetGroup');
            
            if (category === 'moon') {
                parentGroup.style.display = 'block';
                document.getElementById('parentPlanet').required = true;
            } else {
                parentGroup.style.display = 'none';
                document.getElementById('parentPlanet').required = false;
            }
        }

        function updateParentPlanetOptions() {
            const parentSelect = document.getElementById('parentPlanet');
            parentSelect.innerHTML = '<option value="">Selecione o planeta...</option>';
            
            // Adicionar planetas padrão
            for (const [key, data] of Object.entries(planetData)) {
                if (key !== 'sol') {
                    parentSelect.innerHTML += `<option value="${data.nome}">${data.nome}</option>`;
                }
            }
            
            // Adicionar planetas do usuário
            userCelestialBodies.forEach(body => {
                if (body.category === 'planet') {
                    parentSelect.innerHTML += `<option value="${body.name}">${body.name}</option>`;
                }
            });
        }

        function clearSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const clearBtn = document.getElementById('clearBtn');
            
            searchInput.value = '';
            searchResults.style.display = 'none';
            clearBtn.style.display = 'none';
        }

        function hideSearchResults() {
            setTimeout(() => {
                document.getElementById('searchResults').style.display = 'none';
            }, 200);
        }

        // Salvar nova informação ou editar existente
        async function saveNewCelestialBody(formData) {
            // Aguardar inicialização do SDK
            const isInitialized = await waitForSDKInitialization();
            if (!isInitialized) {
                showMessage("Erro: Sistema de dados não está disponível", "error");
                return false;
            }
            
            const form = document.getElementById('addForm');
            const editId = form.getAttribute('data-edit-id');
            const isEditing = !!editId;
            
            if (!isEditing && userCelestialBodies.length >= 999) {
                showMessage("Limite máximo de 999 corpos celestes atingido. Exclua alguns itens primeiro.", "error");
                return false;
            }

            const saveBtn = document.getElementById('saveBtn');
            const btnText = saveBtn.querySelector('.btn-text');
            const btnLoading = saveBtn.querySelector('.btn-loading');
            
            // Mostrar loading
            saveBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            
            try {
                if (isEditing) {
                    // Modo de edição - atualizar corpo celeste existente
                    const existingBody = userCelestialBodies.find(b => b.id === editId);
                    if (!existingBody) {
                        showMessage("Corpo celeste não encontrado", "error");
                        return false;
                    }
                    
                    const updatedBody = {
                        ...existingBody,
                        name: formData.name,
                        type: formData.type || formData.category,
                        category: formData.category,
                        parent_planet: formData.parent_planet || '',
                        distance: formData.distance || '',
                        diameter: formData.diameter || '',
                        mass: formData.mass || '',
                        temperature: formData.temperature || '',
                        moons: formData.moons || '',
                        composition: formData.composition || '',
                        curiosities: formData.curiosities,
                        image_url: formData.image_url || '',
                        updated_at: new Date().toISOString()
                    };

                    const result = await window.dataSdk.update(updatedBody);
                    
                    if (result.isOk) {
                        showMessage("Informações atualizadas com sucesso!", "success");
                        closeAddModal();
                        closeInfo(); // Fechar painel de informações para atualizar
                        return true;
                    } else {
                        showMessage("Erro ao atualizar: " + result.error.message, "error");
                        return false;
                    }
                } else {
                    // Modo de criação - criar novo corpo celeste
                    const newBody = {
                        id: generateId(),
                        name: formData.name,
                        type: formData.type || formData.category,
                        category: formData.category,
                        parent_planet: formData.parent_planet || '',
                        distance: formData.distance || '',
                        diameter: formData.diameter || '',
                        mass: formData.mass || '',
                        temperature: formData.temperature || '',
                        moons: formData.moons || '',
                        composition: formData.composition || '',
                        curiosities: formData.curiosities,
                        image_url: formData.image_url || '',
                        created_at: new Date().toISOString()
                    };

                    const result = await window.dataSdk.create(newBody);
                    
                    if (result.isOk) {
                        showMessage("Corpo celeste adicionado com sucesso!", "success");
                        closeAddModal();
                        return true;
                    } else {
                        showMessage("Erro ao salvar: " + result.error.message, "error");
                        return false;
                    }
                }
            } catch (error) {
                showMessage("Erro inesperado ao salvar", "error");
                return false;
            } finally {
                // Esconder loading
                saveBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        }

        function generateId() {
            return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function showMessage(message, type) {
            // Criar toast message inline
            const toast = document.createElement('div');
            toast.className = `toast-message toast-${type}`;
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 10px;
                color: white;
                font-weight: bold;
                z-index: 3000;
                animation: slideIn 0.3s ease;
                ${type === 'success' ? 'background: #4caf50;' : 'background: #f44336;'}
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Renderizar corpos celestes do usuário
        function renderUserCelestialBodies() {
            const solarSystem = document.querySelector('.solar-system');
            
            // Remover corpos celestes do usuário existentes
            const existingUserBodies = solarSystem.querySelectorAll('[data-user-body]');
            existingUserBodies.forEach(el => el.remove());
            
            // Adicionar novos corpos celestes do usuário
            userCelestialBodies.forEach(body => {
                if (body.category === 'planet' || body.category === 'star') {
                    const celestialBodyEl = createCelestialBodyElement(body);
                    solarSystem.appendChild(celestialBodyEl);
                }
            });
            
            // Aplicar filtro atual
            filterByCategory();
        }

        function createCelestialBodyElement(body) {
            const div = document.createElement('div');
            div.className = 'celestial-body';
            div.setAttribute('data-user-body', 'true');
            div.setAttribute('data-category', body.category);
            div.onclick = () => showUserCelestialBodyInfo(body.id);
            
            const imageHtml = body.image_url ? 
                `<img src="${body.image_url}" alt="${body.name}" class="planet-image" onerror="this.style.display='none';">` :
                '';
            
            div.innerHTML = `
                ${imageHtml}
                <div class="planet-name">${body.name}</div>
            `;
            
            return div;
        }

        function showUserCelestialBodyInfo(bodyId) {
            const body = userCelestialBodies.find(b => b.id === bodyId);
            if (!body) return;
            
            const infoPanel = document.getElementById('infoPanel');
            const infoContent = document.getElementById('infoContent');
            
            // Adicionar botões de ação no topo
            let html = `
                <div class="info-item" style="grid-column: 1 / -1; text-align: center; border: 2px solid rgba(255, 215, 0, 0.3); background: rgba(255, 215, 0, 0.1);">
                    <div class="action-buttons">
                        <button onclick="editCelestialBody('${bodyId}')" class="action-btn edit-btn">
                            ✏️ Editar Informações
                        </button>
                        <button onclick="confirmDeleteCelestialBody('${bodyId}')" class="action-btn delete-btn">
                            🗑️ Excluir
                        </button>
                    </div>
                </div>
            `;
            
            const fields = [
                { key: 'type', label: 'Tipo' },
                { key: 'distance', label: 'Distância' },
                { key: 'diameter', label: 'Diâmetro' },
                { key: 'mass', label: 'Massa' },
                { key: 'temperature', label: 'Temperatura' },
                { key: 'moons', label: 'Luas' },
                { key: 'composition', label: 'Composição' },
                { key: 'curiosities', label: 'Curiosidades' }
            ];
            
            fields.forEach(field => {
                if (body[field.key] && body[field.key].trim()) {
                    html += `
                        <div class="info-item">
                            <div class="info-label">${field.label}:</div>
                            <div class="info-value">${body[field.key]}</div>
                        </div>
                    `;
                }
            });
            
            // Mostrar luas do usuário se for um planeta
            if (body.category === 'planet') {
                const userMoons = userCelestialBodies.filter(b => 
                    b.category === 'moon' && b.parent_planet === body.name
                );
                
                if (userMoons.length > 0) {
                    html += `
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <div class="info-label">Luas Adicionadas:</div>
                            <div class="moons-container">
                    `;
                    
                    userMoons.forEach(moon => {
                        html += `
                            <div class="moon-card">
                                <h4 class="moon-name">${moon.name}</h4>
                                <div class="moon-details">
                                    ${moon.diameter ? `<div class="moon-detail"><span class="moon-detail-label">Diâmetro:</span><span class="moon-detail-value">${moon.diameter}</span></div>` : ''}
                                    ${moon.distance ? `<div class="moon-detail"><span class="moon-detail-label">Distância:</span><span class="moon-detail-value">${moon.distance}</span></div>` : ''}
                                    ${moon.temperature ? `<div class="moon-detail"><span class="moon-detail-label">Temperatura:</span><span class="moon-detail-value">${moon.temperature}</span></div>` : ''}
                                    <div class="moon-detail">
                                        <span class="moon-detail-label">Curiosidades:</span>
                                        <span class="moon-detail-value">${moon.curiosities}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += `
                            </div>
                        </div>
                    `;
                }
            }
            
            infoContent.innerHTML = html;
            infoPanel.style.display = 'block';
            infoPanel.scrollIntoView({ behavior: 'smooth' });
        }

        // Filtro por categoria
        function filterByCategory() {
            const filter = document.getElementById('categoryFilter').value;
            currentFilter = filter;
            
            const celestialBodies = document.querySelectorAll('.celestial-body');
            
            celestialBodies.forEach(body => {
                const category = body.getAttribute('data-category');
                const isDefault = !body.hasAttribute('data-user-body');
                
                let shouldShow = false;
                
                if (filter === 'all') {
                    shouldShow = true;
                } else if (filter === 'star') {
                    shouldShow = (isDefault && body.onclick.toString().includes("'sol'")) || 
                               category === 'star';
                } else if (filter === 'planet') {
                    shouldShow = (isDefault && !body.onclick.toString().includes("'sol'")) || 
                               category === 'planet';
                } else if (filter === 'moon') {
                    shouldShow = false; // Luas não aparecem na visualização principal
                }
                
                if (shouldShow) {
                    body.classList.remove('hidden-celestial-body');
                } else {
                    body.classList.add('hidden-celestial-body');
                }
            });
        }

        // Event listeners para busca
        document.addEventListener('DOMContentLoaded', async function() {
            await initializeDataSDK();
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value;
                
                if (query.length > 0) {
                    clearBtn.style.display = 'flex';
                    const results = performSearch(query);
                    displaySearchResults(results);
                } else {
                    clearBtn.style.display = 'none';
                    document.getElementById('searchResults').style.display = 'none';
                }
            });
            
            searchInput.addEventListener('focus', function(e) {
                if (e.target.value.length > 0) {
                    const results = performSearch(e.target.value);
                    displaySearchResults(results);
                }
            });
            
            searchInput.addEventListener('blur', hideSearchResults);
            
            // Prevenir que o blur esconda os resultados quando clicando neles
            document.getElementById('searchResults').addEventListener('mousedown', function(e) {
                e.preventDefault();
            });
            
            // Busca por Enter
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const results = performSearch(e.target.value);
                    if (results.length > 0) {
                        selectSearchResult(results[0].id, results[0].category);
                    }
                }
            });
            
            // Event listener para o formulário
            document.getElementById('addForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const formData = {
                    name: document.getElementById('bodyName').value.trim(),
                    category: document.getElementById('bodyCategory').value,
                    parent_planet: document.getElementById('parentPlanet').value,
                    type: document.getElementById('bodyType').value.trim(),
                    distance: document.getElementById('bodyDistance').value.trim(),
                    diameter: document.getElementById('bodyDiameter').value.trim(),
                    mass: document.getElementById('bodyMass').value.trim(),
                    temperature: document.getElementById('bodyTemperature').value.trim(),
                    moons: document.getElementById('bodyMoons').value.trim(),
                    composition: document.getElementById('bodyComposition').value.trim(),
                    curiosities: document.getElementById('bodyCuriosities').value.trim(),
                    image_url: document.getElementById('bodyImageUrl').value.trim()
                };
                
                // Validações
                if (!formData.name) {
                    showMessage("Nome é obrigatório", "error");
                    return;
                }
                
                if (!formData.category) {
                    showMessage("Categoria é obrigatória", "error");
                    return;
                }
                
                if (formData.category === 'moon' && !formData.parent_planet) {
                    showMessage("Planeta principal é obrigatório para luas", "error");
                    return;
                }
                
                if (!formData.curiosities) {
                    showMessage("Curiosidades são obrigatórias", "error");
                    return;
                }
                
                await saveNewCelestialBody(formData);
            });
        });

        async function onConfigChange(config) {
            document.getElementById('mainTitle').textContent = config.main_title || defaultConfig.main_title;
            document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
            document.getElementById('infoPanelTitle').textContent = config.info_panel_title || defaultConfig.info_panel_title;
        }

        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange,
                mapToCapabilities: (config) => ({
                    recolorables: [],
                    borderables: [],
                    fontEditable: undefined,
                    fontSizeable: undefined
                }),
                mapToEditPanelValues: (config) => new Map([
                    ["main_title", config.main_title || defaultConfig.main_title],
                    ["subtitle", config.subtitle || defaultConfig.subtitle],
                    ["info_panel_title", config.info_panel_title || defaultConfig.info_panel_title]
                ])
            });
        }

        initializeDataSDK();
        
        // Inicializar VLibras
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
 
</body>
